[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[program:backend]
command=/usr/local/bin/uvicorn main:app --host 127.0.0.1 --port 8000 --workers 1 --no-access-log
directory=/app/backend
user=app
autostart=true
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"

[program:frontend]
# standalone build: server.js lives at /app/frontend/server.js (after
# copying from .next/standalone which flattens the path).
command=node /app/frontend/server.js
directory=/app/frontend
user=app
autostart=true
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=HOSTNAME="0.0.0.0",PORT="5647",NODE_ENV="production"
