services:
  vietnamlaw:
    build: .
    image: vietnamlaw:latest
    container_name: vietnamlaw
    restart: unless-stopped
    # Port mapping: 5647 (frontend) only — backend on 8000 stays internal
    ports:
      - "5647:5647"
    env_file:
      - .env.production
    # Optional: persist the BM25 index so we don't rebuild on every restart.
    # The .pkl is generated by scripts/build_bm25_index.py on first boot.
    volumes:
      - bm25-data:/app/backend/data
    # Tiny health probe (matches Dockerfile HEALTHCHECK)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5647/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    # Reasonable for a small VPS; tune to host capacity
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  bm25-data:
